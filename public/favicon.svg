<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy background -->
  <rect width="100" height="100" fill="#0C1832"/>

  <!-- VA Ligature Mark (Recommended from redesign v3) -->
  <!-- Left V and right A strokes in teal -->
  <path d="M14 26 L36 74 L58 26 L80 74" fill="none" stroke="#18B0AD" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Orange crossbar (the live connection / work passing through) -->
